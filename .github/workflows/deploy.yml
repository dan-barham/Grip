name: Deploy to GoDaddy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload via SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          uploads: |
            ./index.html => /home/addc5vqc95ni/public_html/grip/
            ./grip-api.php => /home/addc5vqc95ni/public_html/grip/
            ./grip-version.php => /home/addc5vqc95ni/public_html/grip/
            ./schema.sql => /home/addc5vqc95ni/public_html/grip/
