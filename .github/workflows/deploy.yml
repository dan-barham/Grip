name: Deploy to GoDaddy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Stage files for upload
        run: |
          mkdir -p _deploy
          cp index.html grip-api.php grip-version.php schema.sql _deploy/
          ls -la _deploy/

      - name: Upload via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          local_path: './_deploy/*'
          remote_path: '/home/addc5vqc95ni/public_html/grip'
          sftp_only: true
          delete_remote_files: false
